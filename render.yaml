# Render Blueprint — deploy the Express API (backend/)
# Docs: https://render.com/docs/blueprint-spec
#
# Pair with:
#   - Frontend on Vercel (set VITE_API_URL to this service URL)
#   - PostgreSQL on Neon or Render (set DATABASE_URL)

services:
  - type: web
    name: ozone-attendance-api
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: TZ
        value: Asia/Kolkata
      - key: STORAGE_DRIVER
        value: local
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "8"
      - key: ADMIN_EMPLOYEE_ID
        value: OZNADMIN
      - key: ADMIN_PASSWORD
        sync: false
      - key: OTP_RECEIVER_EMAIL
        sync: false
      - key: GEOCODE_PROVIDER
        value: google
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GOOGLE_MAPS_BROWSER_API_KEY
        sync: false
    disk:
      # Persists uploads/ (selfies, avatars, site photos) and uploads/backups/
      name: uploads
      mountPath: /opt/render/project/src/backend/uploads
      sizeGB: 1
