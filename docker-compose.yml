services:
  postgres:
    image: postgres:16-alpine
    container_name: ozone-attendance-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ozone
      POSTGRES_PASSWORD: ozone_dev_password
      POSTGRES_DB: ozone_attendance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ozone -d ozone_attendance"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
